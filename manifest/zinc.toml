# zinc.toml — manifest member of the forge root workspace. Workspace config and
# shared external deps live in the forge root zinc.toml; manifest-core is a
# sibling member. Member deps below reference siblings/external deps by name.

[package]
name = "manifest"
version = "0.1.0.0"

[build.lib]
source-dirs = ["src"]
ghc-options = [
  "-Wall",
  "-XOverloadedStrings",
  "-XScopedTypeVariables",
  "-XTypeApplications",
  "-XLambdaCase",
  "-XTupleSections",
]
depends = [
  "base",
  "bytestring",
  "containers",
  "stm",
  "text",
  "time",
  "transformers",
  "process",
  "directory",
  "postgresql-libpq",
  "profunctors",
  "autodocodec",
  "aeson",
  "manifest-core",
]

[build.test.spec]
source-dirs = ["test", "docs/tutorials"]
main = "Spec.hs"
ghc-options = [
  "-XOverloadedStrings",
  "-XScopedTypeVariables",
  "-XTypeApplications",
  "-XLambdaCase",
  "-pgmL", "markdown-unlit",  # run literate .lhs tutorials through markdown-unlit (```haskell blocks); .hs unaffected
  "-lpq",  # link libpq into the test exe (libpq libdir is on LIBRARY_PATH via the flake)
]
depends = [
  "base",
  "bytestring",
  "containers",
  "stm",
  "text",
  "time",
  "transformers",
  "process",
  "directory",
  "filepath",
  "postgresql-libpq",
  "manifest",
  "manifest-core",
  "autodocodec",
  "aeson",
]

[build.exe.manifest-migrate]
source-dirs = ["app"]
main = "Main.hs"
ghc-options = ["-Wall", "-lpq"]
depends = ["base", "bytestring", "text", "manifest"]
