# packages/crucible/zinc.toml — member manifest for the crucible library
#
# zinc new generates [build.exe.<name>] by default.
# crucible is a library, so this uses [build.lib] instead.
# source-dirs = ["src"] — modules auto-discovered; no hiding needed.

[package]
name = "crucible"
version = "0.1.0"

[build.lib]
source-dirs = ["src"]
depends = ["base", "text", "bytestring", "mtl", "effectful", "effectful-core", "http-client", "http-client-tls"]

[build.exe.crucible-anthropic]
source-dirs = ["app"]
main = "Main.hs"
depends = ["base", "text", "crucible", "effectful", "effectful-core"]

[build.test.spec]
source-dirs = ["test"]
main = "Spec.hs"
depends = ["base", "text", "mtl", "crucible", "effectful", "effectful-core"]
