# zinc.toml — crucible member of the forge root workspace. Flat single-package
# layout: src/, app/, test/. Workspace config and shared external deps live in
# the forge root zinc.toml; crucible-manifest / crucible-worker are sibling
# members. Member deps below reference siblings/external deps by name.

[package]
name = "crucible"
version = "0.1.0"

[build.lib]
source-dirs = ["src"]
depends = ["base", "text", "bytestring", "mtl", "effectful", "effectful-core", "http-client", "http-client-tls", "http-types", "retry", "exceptions", "aeson", "autodocodec", "autodocodec-schema", "vector", "scientific", "neat-interpolation", "base64-bytestring", "filepath", "directory", "manifest-core", "time"]

[build.exe.crucible-anthropic]
source-dirs = ["app"]
main = "Main.hs"
depends = ["base", "text", "crucible", "effectful", "effectful-core", "aeson", "autodocodec", "neat-interpolation"]

[build.test.spec]
source-dirs = ["test"]
main = "Spec.hs"
depends = ["base", "text", "bytestring", "mtl", "crucible", "effectful", "effectful-core", "aeson", "autodocodec", "autodocodec-schema", "vector", "scientific", "directory", "base64-bytestring"]
