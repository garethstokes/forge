# zinc.toml — workspace manifest (root of the crucible git repo)
#
# DISCOVERED SCHEMA (empirical, from `zinc new` + zinc self-hosting source):
#
# WORKSPACE FILE (this file, repo root):
#   [workspace]
#     members = [<relative-path>, ...]   # list of package dirs; "." = root itself
#     ghc = "<version>"                  # e.g. "9.6.5" — toolchain pin
#   [dependencies]
#     <name> = { rev = "<sha>", repo = "<url>[#<subpath>]" }
#     # boot libs (base, Cabal, etc.) need no entry — GHC ships them
#     # optional: ghc-options = [...]
#   [registry]
#     <name> = "<url>"                   # shorthand for repo URL (no rev override)
#
# MEMBER FILE (packages/crucible/zinc.toml):
#   [package]
#     name = "<name>"
#     version = "<semver>"
#   [build.lib]                          # LIBRARY target (unnamed, only one allowed)
#     source-dirs = ["src"]              # dirs auto-discovered for modules (no hiding)
#     depends = [<boot-or-dep-names>]    # package names from [dependencies] or GHC boot
#   [build.exe.<name>]                   # EXECUTABLE target (named)
#     source-dirs = ["app"]
#     main = "Main.hs"
#     ghc-options = [...]                # optional
#     depends = [...]
#   [build.test.<name>]                  # TEST target (named)
#     source-dirs = ["test"]
#     main = "Spec.hs"
#     depends = [...]
#
# NOTE: `zinc new` scaffolds an exe target by default.
# crucible is a library — member zinc.toml uses [build.lib] instead.

[workspace]
members = ["packages/crucible"]
ghc = "9.6.5"

[dependencies]

[registry]
