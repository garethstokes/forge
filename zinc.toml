# zinc.toml — crucible workspace + package in one file (single member, the repo
# root). [workspace], [package], [build.*], and [dependencies]/[registry]
# coexist here (member ".") — a flat single-package layout: src/, app/, test/.

[workspace]
members = ["."]
ghc = "9.10.1"

[package]
name = "crucible"
version = "0.1.0"

[build.lib]
source-dirs = ["src"]
depends = ["base", "text", "bytestring", "mtl", "effectful", "effectful-core", "http-client", "http-client-tls", "http-types", "retry", "exceptions", "aeson", "autodocodec", "autodocodec-schema"]

[build.exe.crucible-anthropic]
source-dirs = ["app"]
main = "Main.hs"
depends = ["base", "text", "crucible", "effectful", "effectful-core"]

[build.test.spec]
source-dirs = ["test"]
main = "Spec.hs"
depends = ["base", "text", "bytestring", "mtl", "crucible", "effectful", "effectful-core", "autodocodec-schema"]

[dependencies]

[dependencies.effectful]
tag = "*"
repo = "https://github.com/haskell-effectful/effectful.git"

[dependencies.effectful-core]
tag = "*"
repo = "https://github.com/haskell-effectful/effectful.git#effectful-core"

[dependencies.monad-control]
rev = "378524047ba8f879133bd94e3586bac821187e9e"
repo = "https://github.com/basvandijk/monad-control.git"

[dependencies.strict-mutable-base]
rev = "beea8212f10c9b003e86b208a78de43de8f0442c"
repo = "https://github.com/arybczak/strict-mutable.git#strict-mutable-base"

[dependencies.hpke]
vendored = "0.1.0"

[dependencies.mlkem]
vendored = "0.2.1.0"

[dependencies.http-client-tls]
repo = "https://github.com/snoyberg/http-client"

[dependencies.ram]
vendored = "0.22.0"

[dependencies.retry]
repo = "https://github.com/Soostone/retry.git"

# aeson + autodocodec for the domain codec layer (autodocodec = codec + JSON
# Schema, as used by sibling project manifest for shared-types jsonb persistence).
# Resolved from git by `zinc add`; the closure (aeson 2.3.0.0, autodocodec
# 0.5.0.0, ~27 deps) is shared with manifest in the zinc store on GHC 9.10.1.

[dependencies.autodocodec]
repo = "https://github.com/NorfairKing/autodocodec"

[dependencies.aeson]
repo = "https://github.com/haskell/aeson.git"

[dependencies.autodocodec-schema]
repo = "https://github.com/NorfairKing/autodocodec"
