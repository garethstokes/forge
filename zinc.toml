[workspace]
members = ["."]
ghc = "9.12.2"

[package]
name = "manifest-evals"
version = "0.1.0.0"

[build.lib]
source-dirs = ["src"]
ghc-options = ["-Wall", "-XOverloadedStrings"]
depends = ["base", "text", "time", "bytestring", "aeson", "manifest", "crucible", "effectful", "effectful-core", "async"]

[build.test.spec]
source-dirs = ["test"]
main = "Spec.hs"
ghc-options = ["-XOverloadedStrings", "-lpq"]
depends = ["base", "text", "time", "bytestring", "aeson", "containers", "manifest", "crucible", "manifest-evals"]

[build.exe.manifest-evals]
source-dirs = ["app"]
main = "Main.hs"
ghc-options = ["-Wall", "-XOverloadedStrings", "-lpq"]
depends = ["base", "text", "bytestring", "manifest", "manifest-evals"]

[dependencies]

[dependencies.manifest]
repo = "https://github.com/garethstokes/manifest.git"
rev = "7942161c263b399f2a123bdcb6b348020fbec19c"

[dependencies.crucible]
repo = "https://github.com/garethstokes/crucible.git"
# Pushed remote master: the DevEx naming overhaul (Skill, Chat.Message,
# Crucible.Decode, qualified interpreters) + the GHC 9.12.2 toolchain bump.
rev = "0cb8c176394a6966dae2aec23396d60f6a962d79"

# --- crucible's transitive dependency stanzas (copied verbatim) ---

[dependencies.effectful]
tag = "*"
repo = "https://github.com/haskell-effectful/effectful.git"

[dependencies.effectful-core]
tag = "*"
repo = "https://github.com/haskell-effectful/effectful.git#effectful-core"

[dependencies.monad-control]
rev = "378524047ba8f879133bd94e3586bac821187e9e"
repo = "https://github.com/basvandijk/monad-control.git"

[dependencies.strict-mutable-base]
rev = "beea8212f10c9b003e86b208a78de43de8f0442c"
repo = "https://github.com/arybczak/strict-mutable.git#strict-mutable-base"

[dependencies.hpke]
vendored = "0.1.0"

[dependencies.mlkem]
vendored = "0.2.1.0"

[dependencies.http-client-tls]
repo = "https://github.com/snoyberg/http-client"

[dependencies.ram]
vendored = "0.22.0"

[dependencies.retry]
repo = "https://github.com/Soostone/retry.git"

# aeson + autodocodec for the domain codec layer (autodocodec = codec + JSON
# Schema, as used by sibling project manifest for shared-types jsonb persistence).
# Resolved from git by `zinc add`; the closure (aeson 2.3.0.0, autodocodec
# 0.5.0.0, ~27 deps) is shared with manifest in the zinc store on GHC 9.10.1.

[dependencies.autodocodec]
repo = "https://github.com/NorfairKing/autodocodec"

[dependencies.aeson]
repo = "https://github.com/haskell/aeson.git"

[dependencies.autodocodec-schema]
repo = "https://github.com/NorfairKing/autodocodec"

[dependencies.neat-interpolation]
repo = "https://github.com/nikita-volkov/neat-interpolation.git"

# --- manifest's unique transitive dependency stanzas ---

[dependencies.postgresql-libpq]
rev = "240147a5225b4e19e20abb9d1103e66b1b55b5a2"  # v0.11.0.0
repo = "https://github.com/haskellari/postgresql-libpq"
flags = { use-pkg-config = true }  # Simple pkgconfig provider (avoids build-type Configure)

[dependencies.profunctors]
repo = "https://github.com/ekmett/profunctors.git"
