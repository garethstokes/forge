# zinc.toml — manifest-evals member of the forge root workspace. Workspace
# config and shared external deps live in the forge root zinc.toml; evals-api /
# evals-ui are sibling members, and manifest / crucible are now in-tree
# workspace members (resolved by name, no git pin). Member deps below reference
# siblings/external deps by name.

[package]
name = "manifest-evals"
version = "0.1.0.0"

[build.lib]
source-dirs = ["src"]
ghc-options = ["-Wall", "-XOverloadedStrings"]
depends = ["base", "text", "time", "bytestring", "aeson", "manifest", "crucible", "effectful", "effectful-core", "async", "evals-api", "wai", "http-types", "filepath", "directory", "containers", "stm"]

[build.test.spec]
source-dirs = ["test"]
main = "Spec.hs"
ghc-options = ["-XOverloadedStrings", "-lpq", "-threaded"]
depends = ["base", "text", "time", "bytestring", "aeson", "containers", "manifest", "crucible", "manifest-evals", "evals-api", "wai", "warp", "http-client", "http-types", "directory"]

[build.exe.manifest-evals]
source-dirs = ["app"]
main = "Main.hs"
ghc-options = ["-Wall", "-XOverloadedStrings", "-lpq"]
depends = ["base", "text", "time", "bytestring", "manifest", "manifest-evals", "crucible"]

[build.exe.evals-dashboard]
source-dirs = ["app-dashboard"]
main = "Main.hs"
ghc-options = ["-Wall", "-XOverloadedStrings", "-threaded", "-lpq"]
depends = ["base", "text", "bytestring", "wai", "warp", "http-types", "filepath", "directory", "manifest", "manifest-evals", "evals-api", "aeson"]
